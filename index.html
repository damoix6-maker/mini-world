<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini World Creata - Скрипты</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a0f;color:#e0e0e0;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1a1a2e}
::-webkit-scrollbar-thumb{background:#6c5ce7;border-radius:3px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 5px rgba(108,92,231,.3)}50%{box-shadow:0 0 20px rgba(108,92,231,.6)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes celebrate{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes savedPop{0%{opacity:0;transform:translateY(-5px)}100%{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .4s ease forwards}
.glass{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06)}
.glass-strong{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1)}
.btn-primary{background:linear-gradient(135deg,#6c5ce7,#a855f7);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(108,92,231,.4)}
.btn-hint{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24;transition:all .3s;cursor:pointer}
.btn-hint:hover{background:rgba(245,158,11,.2)}
.btn-deep{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;transition:all .3s;cursor:pointer;animation:shake .5s ease}
.btn-deep:hover{background:rgba(239,68,68,.2)}
.btn-export{background:linear-gradient(135deg,#10b981,#059669);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-export:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(16,185,129,.4)}
.btn-import{background:linear-gradient(135deg,#3b82f6,#2563eb);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-import:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(59,130,246,.4)}
.btn-copy{background:linear-gradient(135deg,#f59e0b,#d97706);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-copy:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(245,158,11,.4)}
.btn-paste{background:linear-gradient(135deg,#ec4899,#db2777);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-paste:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(236,72,153,.4)}
.btn-secondary{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:all .3s;cursor:pointer;color:#ccc}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-kb{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:all .3s;cursor:pointer;color:#888;font-size:18px}
.btn-kb:hover{background:rgba(255,255,255,.1);color:#e0e0e0}
.card-hover{transition:all .3s;position:relative;overflow:hidden}
.card-hover:hover{transform:translateY(-4px)}
.card-hover:hover .card-bg{opacity:.15}
.card-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(168,85,247,.05));transition:opacity .4s;opacity:0}
.level-card{transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
.level-card:hover:not(.locked){transform:scale(1.01)}
.level-card.locked{opacity:.4;cursor:not-allowed;filter:grayscale(.5)}
.prac-card{transition:all .3s;cursor:pointer;position:relative;overflow:hidden;border-left:3px solid #f59e0b}
.prac-card:hover{transform:scale(1.01)}
.prac-card.done{border-left-color:#00d26a}
.prac-card.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.5)}
.particle-canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
input,textarea{background:rgba(255,255,255,.05)!important;border:1px solid rgba(255,255,255,.1)!important;color:#e0e0e0!important;transition:all .3s;border-radius:.5rem}
input:focus,textarea:focus{border-color:#6c5ce7!important;box-shadow:0 0 15px rgba(108,92,231,.2)!important;outline:none!important}
.code-editor{font-family:'Consolas','Monaco',monospace;background:#1a1a2e!important;border:1px solid rgba(108,92,231,.3)!important;color:#a8e6cf!important;line-height:1.6}
.progress-bar{background:linear-gradient(90deg,#6c5ce7,#a855f7);transition:width .6s}
.shimmer-text{background:linear-gradient(90deg,#6c5ce7,#a855f7,#6c5ce7);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
.hero-gradient{background:radial-gradient(ellipse at 50% 0%,rgba(108,92,231,.15) 0%,transparent 60%),#0a0a0f}
.badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
.badge-purple{background:rgba(108,92,231,.15);color:#a78bfa;border:1px solid rgba(108,92,231,.3)}
.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.badge-green{background:rgba(0,210,106,.15);color:#00d26a;border:1px solid rgba(0,210,106,.3)}
.badge-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.tab-btn{transition:all .2s;border-bottom:2px solid transparent;padding-bottom:6px;cursor:pointer}
.tab-btn.active{color:#a855f7;border-bottom-color:#a855f7}
.tab-btn:hover{color:#a855f7}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;animation:savedPop .3s ease forwards}
.toast-success{background:rgba(0,210,106,.2);border:1px solid rgba(0,210,106,.4);color:#00d26a}
.toast-unlock{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);color:#fbbf24}
.toast-error{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#f87171}
.toast-info{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);color:#60a5fa}
.line-ok{background:rgba(0,210,106,.12);border-left:3px solid #00d26a;padding:2px 6px;margin:1px 0;border-radius:3px}
.line-err{background:rgba(239,68,68,.1);border-left:3px solid #ef4444;padding:2px 6px;margin:1px 0;border-radius:3px}
.hint-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;overflow:hidden;transition:all .3s}
.deep-hint-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;overflow:hidden}
.task-desc{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.2);border-radius:8px;padding:12px}
.drop-zone{border:2px dashed rgba(255,255,255,.15);transition:all .3s}
.drop-zone:hover,.drop-zone.dragover{border-color:rgba(108,92,231,.5);background:rgba(108,92,231,.05)}
</style>
</head>
<body>
<canvas id="fw-canvas" style="position:fixed;inset:0;z-index:9998;pointer-events:none"></canvas>
<div id="app"></div>
<script>
var S={
  page:"home",
  auth:false,
  tab:"create",
  courses:[],
  progress:{},
  curCourse:null,
  curLevelIdx:-1,
  curPracId:null,
  pracRes:null,
  hintLevel:0,
  deepHintShown:false,
  editCourse:null,
  editPrac:null
};

function save(){try{localStorage.setItem("mwc_c",JSON.stringify(S.courses));localStorage.setItem("mwc_p",JSON.stringify(S.progress))}catch(e){}}
function load(){try{var c=localStorage.getItem("mwc_c");var p=localStorage.getItem("mwc_p");if(c)S.courses=JSON.parse(c);if(p)S.progress=JSON.parse(p)}catch(e){}}

function defaults(){
  if(S.courses.length===0){
    S.courses=[
      {id:1,title:"Основы скриптов",description:"Изучите базовые команды скриптов в Mini World Creata",icon:"\u26A1",color:"#6c5ce7",locked:false,levels:[
        {id:1,title:"Переменные",content:"В Mini World Creata переменные хранят данные.\nТипы данных:\n\u2022 string \u2014 текст: \"Привет\"\n\u2022 number \u2014 числа: 42, 3.14"},
        {id:2,title:"Объекты",content:"Объекты \u2014 основа игры.\nКоманды:\n\u2022 spawn \u2014 создать объект\n\u2022 move \u2014 переместить"}
      ],practices:[
        {id:10,title:"Переменные в действии",levelIdx:0,task:"Создайте переменную с помощью let, присвойте ей любой текст, затем выведите её через print() на новой строке",solution:"let myVar = \"Hello\";\nprint(myVar);",hints:["Начните с let имя = \"текст\";","На следующей строке используйте print(имяПеременной)","Название переменной придумайте сами \u2014 например score, name, greeting"]},
        {id:11,title:"Создание мира",levelIdx:0,task:"Разместите 3 блока разного типа с помощью spawn \u2014 задайте каждому свои координаты x, y, z",solution:"spawn(\"grass\",0,0,0);\nspawn(\"stone\",5,0,0);\nspawn(\"torch\",2,3,2);",hints:["spawn(\"тип\", x, y, z) \u2014 создаёт блок","Укажите тип блока в кавычках, например grass, stone, wood","Задайте разные координаты каждому блоку"]},
        {id:12,title:"Движение объектов",levelIdx:1,task:"Создайте объект через spawn, затем переместите его командой move в другие координаты",solution:"spawn(\"cube\",0,0,0);\nmove(obj,10,5,0);",hints:["Сначала spawn \u2014 создайте объект","Затем move(объект, newX, newY, newZ) \u2014 переместите","Координаты выберите сами"]}
      ]},
      {id:2,title:"Продвинутые скрипты",description:"Функции, массивы и циклы",icon:"\uD83D\uDE80",color:"#a855f7",locked:true,levels:[
        {id:3,title:"Функции",content:"Функции позволяют переиспользовать код.\nfunction name() {\n  return value;\n}"}
      ],practices:[
        {id:20,title:"Написание функции",levelIdx:0,task:"Создайте функцию, которая внутри вызывает spawn и возвращает результат через return",solution:"function go(){\n  return spawn(\"block\",0,0,0);\n}",hints:["Начните с function имя(){","Внутри используйте return и spawn","Закройте функцию закрывающей скобкой }"]}
      ]}
    ];
    save();
  }
}

function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function showToast(msg,type){
  var old=document.querySelector(".toast");if(old)old.remove();
  var t=document.createElement("div");t.className="toast toast-"+(type||"success");
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.remove()},3000);
}
function dismissKb(){var el=document.getElementById("pcode");if(el){el.blur()}}
function getCourse(id){for(var i=0;i<S.courses.length;i++){if(S.courses[i].id===id)return S.courses[i]}return null}
function goHome(){S.page="home";S.curCourse=null;render()}
function goCourse(id){S.curCourse=id;S.curLevelIdx=-1;S.curPracId=null;S.page="course";render()}
function goAdmin(){S.page="admin";S.tab="create";S.auth=false;render()}
function getCourseProgress(cid){var p=S.progress[cid];if(!p)return{completedLevels:[],completedPractices:[]};return p}
function isLevelRead(cid,lidx){return getCourseProgress(cid).completedLevels.indexOf(lidx)!==-1}
function isPracDone(cid,pid){return getCourseProgress(cid).completedPractices.indexOf(pid)!==-1}
function isLevelUnlocked(cid,lidx){
  var course=getCourse(cid);if(!course)return false;
  if(lidx===0)return true;
  var prevPracs=getPracsForLevel(course,lidx-1);
  if(prevPracs.length===0)return true;
  for(var i=0;i<prevPracs.length;i++){if(!isPracDone(cid,prevPracs[i].id))return false}
  return true;
}
function isPracUnlocked(cid,lidx){return isLevelRead(cid,lidx)}
function getPracsForLevel(course,lidx){
  var ps=course.practices||[];var r=[];
  for(var i=0;i<ps.length;i++){if(ps[i].levelIdx===lidx)r.push(ps[i])}return r;
}
function isCourseComplete(cid){
  var course=getCourse(cid);if(!course)return false;
  var p=getCourseProgress(cid);
  if(p.completedLevels.length<course.levels.length)return false;
  for(var i=0;i<(course.practices||[]).length;i++){if(!isPracDone(cid,course.practices[i].id))return false}
  return true;
}
function countLevels(cid){var course=getCourse(cid);return course?course.levels.length:0}
function countDoneLevels(cid){return getCourseProgress(cid).completedLevels.length}

function tryUnlockNextCourse(cid){
  if(!isCourseComplete(cid))return;
  var idx=-1;
  for(var i=0;i<S.courses.length;i++){if(S.courses[i].id===cid){idx=i;break}}
  if(idx<0)return;
  if(idx+1<S.courses.length && S.courses[idx+1].locked){
    S.courses[idx+1].locked=false;
    save();
    showToast("\uD83D\uDD13 "+S.courses[idx+1].title+" разблокирован!","unlock");
  }
}

// ===== ЭКСПОРТ =====
function copyCourses(){
  try{
    var json=JSON.stringify(S.courses,null,2);
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(json).then(function(){
        showToast("\u2705 Курсы скопированы в буфер обмена! ("+S.courses.length+" курсов)","info");
      }).catch(function(){fallbackCopy(json)});
    }else{fallbackCopy(json)}
  }catch(e){showToast("\u274C Ошибка копирования","error")}
}
function fallbackCopy(text){
  var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");showToast("\u2705 Курсы скопированы в буфер обмена!","info")}
  catch(e){showToast("\u274C Не удалось скопировать","error")}
  document.body.removeChild(ta);
}
function downloadCourses(){
  var data={courses:JSON.parse(JSON.stringify(S.courses)),version:1,exportDate:new Date().toISOString()};
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;
  a.download="mini_world_courses_"+Date.now()+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("\u2705 Файл скачан! ("+S.courses.length+" курсов)","success");
}

// ===== ИМПОРТ =====
function processImport(text){
  try{
    var data=JSON.parse(text);
    var courses=null;
    if(data.courses && Array.isArray(data.courses)){courses=data.courses}
    else if(Array.isArray(data)){courses=data}
    else if(data.data && Array.isArray(data.data)){courses=data.data}
    if(!courses){showToast("\u274C Неверный формат: массив курсов не найден","error");return}
    for(var i=0;i<courses.length;i++){
      if(!courses[i].title||!courses[i].levels){showToast("\u274C Курс некорректен","error");return}
    }
    var added=0;
    for(var j=0;j<courses.length;j++){
      var exists=false;
      for(var k=0;k<S.courses.length;k++){if(S.courses[k].id===courses[j].id){exists=true;break}}
      if(!exists){S.courses.push(courses[j]);added++}
    }
    if(added>0){save();showToast("\u2705 Импортировано "+added+" новых курсов!","success");render()}
    else{showToast("\u26A0\uFE0F Все курсы уже существуют","success")}
  }catch(e){showToast("\u274C Ошибка: "+e.message,"error")}
}
function pasteFromClipboard(){
  if(navigator.clipboard && navigator.clipboard.readText){
    navigator.clipboard.readText().then(function(text){
      processImport(text);
    }).catch(function(){showToast("\u274C Нет доступа к буферу. Вставьте текст вручную.","error")});
  }else{showToast("\u274C Вставьте JSON в поле ниже и нажмите Импортировать","error")}
}
function handleFileSelect(files){
  if(!files||files.length===0)return;
  var reader=new FileReader();
  reader.onload=function(e){processImport(e.target.result)};
  reader.readAsText(files[0]);
}
function triggerImport(){
  var input=document.createElement("input");
  input.type="file";input.accept=".json,.txt";
  input.onchange=function(e){handleFileSelect(e.target.files)};
  input.click();
}
function importFromTextarea(){
  var el=document.getElementById("import-text");
  if(!el)return;
  var text=el.value.trim();
  if(!text){showToast("\u274C Вставьте JSON в поле","error");return}
  processImport(text);
  el.value="";
}
function setupDropZone(){
  var dz=document.getElementById("drop-zone");
  if(!dz)return;
  dz.addEventListener("dragover",function(e){e.preventDefault();dz.classList.add("dragover")});
  dz.addEventListener("dragleave",function(){dz.classList.remove("dragover")});
  dz.addEventListener("drop",function(e){e.preventDefault();dz.classList.remove("dragover");handleFileSelect(e.dataTransfer.files)});
}

function render(){
  var app=document.getElementById("app");if(!app)return;
  var html="";
  if(S.page==="home")html=rHome();
  else if(S.page==="admin")html=rAdmin();
  else if(S.page==="course")html=rCourse();
  else if(S.page==="readLevel")html=rReadLevel();
  else if(S.page==="doPractice")html=rDoPractice();
  else if(S.page==="complete")html=rComplete();
  app.innerHTML=html;
  setTimeout(function(){initParticles();setupDropZone()},100);
}

function rHome(){
  var h="";
  for(var i=0;i<S.courses.length;i++){
    var c=S.courses[i];var done=isCourseComplete(c.id);var lock=c.locked&&!done;
    var tot=countLevels(c.id);var d=countDoneLevels(c.id);var pct=tot>0?Math.round(d/tot*100):0;
    var btn=d>0&&d<tot?"Продолжить":"Начать";
    h+='<div class="card-hover glass rounded-2xl p-5 slide-up" style="animation-delay:'+i*.1+'s" onclick="';
    if(!lock)h+='goCourse('+c.id+')';
    h+='"><div class="card-bg rounded-2xl"></div><div class="relative z-10">';
    h+='<div class="flex items-center gap-3 mb-3"><div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl flex-shrink-0" style="background:'+c.color+'22;border:1px solid '+c.color+'44">'+c.icon+'</div>';
    h+='<div class="min-w-0"><h3 class="text-lg font-bold text-white truncate">'+esc(c.title)+'</h3>';
    if(lock)h+='<span class="text-xs text-gray-500">\uD83D\uDD12 Заблокирован</span>';
    if(done)h+='<span class="text-xs text-green-400">\u2705 Пройден</span>';
    h+='</div></div>';
    h+='<p class="text-gray-400 text-xs mb-3" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc(c.description)+'</p>';
    h+='<div class="flex items-center gap-2 mb-3"><div class="flex-1 h-1.5 bg-white/5 rounded-full overflow-hidden"><div class="progress-bar h-full rounded-full" style="width:'+pct+'%"></div></div>';
    h+='<span class="text-xs text-gray-500">'+d+'/'+tot+' ур.</span></div>';
    if(lock)h+='<button disabled class="w-full py-2 rounded-lg bg-white/5 text-gray-500 text-xs cursor-not-allowed">\uD83D\uDD12 Заблокирован</button>';
    else h+='<button onclick="event.stopPropagation();goCourse('+c.id+')" class="btn-primary w-full py-2 rounded-lg text-white text-xs font-semibold">'+btn+'</button>';
    h+='</div></div>';
  }
  var empty='';
  if(S.courses.length===0)empty='<div class="text-center py-16 slide-up"><div class="text-5xl mb-3">\uD83D\uDCDA</div><h3 class="text-lg text-gray-400 mb-2">Курсов пока нет</h3></div>';

  var ioBlock='';
  ioBlock+='<div class="mt-12 slide-up">';
  ioBlock+='<div class="text-center mb-4"><h3 class="text-lg font-bold text-white mb-1">\uD83D\uDCC2 Управление курсами</h3>';
  ioBlock+='<p class="text-xs text-gray-500">Экспорт и импорт курсов</p></div>';

  // Кнопки экспорта
  ioBlock+='<div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">';
  ioBlock+='<button onclick="copyCourses()" class="btn-copy py-3 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2">';
  ioBlock+='<span>\uD83D\uDCBB</span> Копировать JSON</button>';
  ioBlock+='<button onclick="downloadCourses()" class="btn-export py-3 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2">';
  ioBlock+='<span>\u2B07\uFE0F</span> Скачать файл</button>';
  ioBlock+='<button onclick="triggerImport()" class="btn-import py-3 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2">';
  ioBlock+='<span>\uD83D\uDCC1</span> Загрузить файл</button>';
  ioBlock+='</div>';

  // Вставка из буфера

function doSaveCourse(){
  try{
    var te=document.getElementById("ct");if(!te){alert("Ошибка формы");return}
    var title=te.value.trim();var descEl=document.getElementById("cd");var desc=descEl?descEl.value.trim():"";
    var iconEl=document.getElementById("ci");var icon=iconEl?iconEl.value.trim():"\uD83D\uDCDA";
    var colorEl=document.getElementById("cc");var color=colorEl?colorEl.value:"#6c5ce7";
    if(!title){alert("Введите название");return}if(!desc){alert("Введите описание");return}
    var ec=S.editCourse;var levels=[];
    for(var i=0;i<ec.levels.length;i++){
      var tEl=document.getElementById("lt"+i);var cEl=document.getElementById("lc"+i);
      var tt=tEl?tEl.value.trim():"";var co=cEl?cEl.value.trim():"";
      if(tt&&co)levels.push({id:Date.now()+i,title:tt,content:co});
    }
    if(levels.length===0){alert("Добавьте хотя бы один уровень");return}
    var practices=[];
    if(ec.practices){
      for(var j=0;j<ec.practices.length;j++){
        var ptt=document.getElementById("pt"+j);var pl=document.getElementById("pl"+j);
        var ptk=document.getElementById("pks"+j);var psol=document.getElementById("psol"+j);
        var phints=document.getElementById("phints"+j);
        var ptitle=ptt?ptt.value.trim():"";var plevelIdx=pl?parseInt(pl.value):0;
        var ptask=ptk?ptk.value.trim():"";var psolution=psol?psol.value.trim():"";
        var phintsArr=phints?phints.value.split('\n').map(function(h){return h.trim()}).filter(function(h){return h}):[];
        if(ptitle)practices.push({id:Date.now()+100+j,title:ptitle,levelIdx:isNaN(plevelIdx)?0:plevelIdx,task:ptask,solution:psolution,hints:phintsArr});
      }
    }
    var found=-1;for(var f=0;f<S.courses.length;f++){if(ec&&S.courses[f].id===ec.id){found=f;break}}
    var nc={id:found>=0?ec.id:Date.now(),title:title,description:desc,icon:icon,color:color,locked:ec&&ec.id?ec.locked:false,levels:levels,practices:practices};
    if(found>=0)S.courses[found]=nc;else S.courses.push(nc);
    S.editCourse=null;save();showToast("\u2705 Сохранено!","success");render();
  }catch(e){alert("Ошибка: "+e.message)}
}

function doSavePrac(){
  try{
    var ep=S.editPrac;if(!ep)return;
    var titleEl=document.getElementById("mp-t");var levelEl=document.getElementById("mp-l");
    var taskEl=document.getElementById("mp-k");var solEl=document.getElementById("mp-e");
    var hintEl=document.getElementById("mp-h");
    if(!titleEl){alert("Ошибка формы");return}
    var title=titleEl.value.trim();var levelIdx=levelEl?parseInt(levelEl.value):0;
    var task=taskEl?taskEl.value.trim():"";var solution=solEl?solEl.value.trim():"";
    var hintsStr=hintEl?hintEl.value:"";var hints=hintsStr.split('\n').map(function(h){return h.trim()}).filter(function(h){return h});
    if(!title){alert("Введите название");return}
    var course=getCourse(ep.cid);if(!course)return;
    if(!course.practices)course.practices=[];
    var obj={id:ep.idx>=0?course.practices[ep.idx].id:Date.now(),title:title,levelIdx:isNaN(levelIdx)?0:levelIdx,task:task,solution:solution,hints:hints};
    if(ep.idx>=0)course.practices[ep.idx]=obj;else course.practices.push(obj);
    S.editPrac=null;save();showToast("\u2705 Сохранено!","success");render();
  }catch(e){alert("Ошибка: "+e.message)}
}

  var html='<div class="min-h-screen hero-gradient pb-8">'+

    '<div class="max-w-4xl mx-auto px-4 py-6">'+

    '<div><h3 class="text-xl font-bold text-white">'+esc(course.title)+'</h3><p class="text-xs text-gray-400">'+esc(course.description)+'</p></div></div>'+
    '<div class="flex items-center gap-2"><div class="flex-1 h-2 bg-white/5 rounded-full overflow-hidden"><div class="progress-bar h-full rounded-full" style="width:'+pct+'%"></div></div>'+
    '<span class="text-xs text-gray-500">'+d+'/'+tot+' ур.</span></div></div>';
  for(var i=0;i<course.levels.length;i++){
    var lv=course.levels[i];var unlocked=isLevelUnlocked(course.id,i);var read=isLevelRead(course.id,i);
    var pracs=getPracsForLevel(course,i);
    var lvlBg=unlocked?(read?"bg-green-500/20 text-green-400":"bg-purple-500/20 text-purple-400"):"bg-white/5 text-gray-600";
    var lvlIcon=unlocked?(read?"\u2713":"\uD83D\uDCD6"):"\uD83D\uDD12";
    var lvlPulse=unlocked&&!read?' style="animation:pulseGlow 2s infinite"':'';
    var lvlStatusText=unlocked?(read?"\u2705 Прочитано":"\u25B6 Текущий"):"\uD83D\uDD12 Заблокирован";
    html+='<div class="level-card glass rounded-xl p-4 '+(unlocked?"":"locked")+'" style="cursor:'+(unlocked?"pointer":"not-allowed")+';animation:slideUp .4s ease forwards;animation-delay:'+i*.1+'s" onclick="'+(unlocked?"readLevel("+i+")":"")+'">'+
      '<canvas class="particle-canvas" id="pc'+i+'" data-status="'+(read?"done":"active")+'" data-color="'+course.color+'"></canvas>'+
      '<div class="relative z-10 flex items-center gap-3">'+
      '<div class="w-10 h-10 rounded-lg flex items-center justify-center text-sm font-bold flex-shrink-0 '+lvlBg+'"'+lvlPulse+'>'+lvlIcon+'</div>'+
      '<div class="min-w-0 flex-1"><h4 class="text-white font-semibold text-sm">'+esc(lv.title)+'</h4><p class="text-[10px] text-gray-400">'+lvlStatusText+'</p></div></div></div>';
    if(read&&pracs.length>0){
      html+='<div class="ml-4 border-l-2 border-amber-500/20 pl-4 mb-2">';
      for(var j=0;j<pracs.length;j++){
        var p=pracs[j];var pDone=isPracDone(course.id,p.id);var pUnlocked=isPracUnlocked(course.id,i);
        var pSt=pDone?"done":(pUnlocked?"":"locked");
        html+='<div class="prac-card glass rounded-xl p-3 mb-2 '+pSt+'" style="cursor:'+(pUnlocked?"pointer":"not-allowed")+';animation:slideUp .3s ease forwards;animation-delay:'+((i*2+j+1)*.08)+'s" onclick="'+(pUnlocked?"doPractice("+p.id+")":"")+'">'+
          '<div class="flex items-center gap-3">'+
          '<div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm flex-shrink-0 '+(pDone?"bg-green-500/20 text-green-400":"bg-amber-500/20 text-amber-400")+'">'+(pDone?"\u2713":"\u270D\uFE0F")+'</div>'+
          '<div class="min-w-0 flex-1"><h4 class="text-white font-semibold text-xs">'+esc(p.title)+'</h4><p class="text-[10px] text-gray-500 truncate">'+esc(p.task.substring(0,60))+'...</p></div>'+
          (pDone?'<span class="badge badge-green">\u0413\u043E\u0442\u043E\u0432</span>':(pUnlocked?'<span class="badge badge-amber">\u0416\u0434\u0451\u0442</span>':'<span class="badge" style="background:rgba(255,255,255,.05);color:#666">\u2716</span>'))+
          '</div></div>';
      }
      html+='</div>';
    }
  }
  html+='</div></div>';return html;
}

}
function markRead(){var course=getCourse(S.curCourse);if(!course)return;var idx=S.curLevelIdx;var p=getCourseProgress(course.id);if(p.completedLevels.indexOf(idx)===-1)p.completedLevels.push(idx);S.progress[course.id]=p;save();S.page="course";render()}

function doPractice(pid){S.curPracId=pid;S.pracRes=null;S.hintLevel=0;S.deepHintShown=false;S.page="doPractice";render()}

function rDoPractice(){
  var course=getCourse(S.curCourse);if(!course)return "";
  var p=null;for(var i=0;i<(course.practices||[]).length;i++){if(course.practices[i].id===S.curPracId){p=course.practices[i];break}}
  if(!p)return "";
  var hints=p.hints||[];
  var shownHints=hints.slice(0,S.hintLevel);
  var allHintsUsed=S.hintLevel>=hints.length;
  var hintsHtml="";
  if(shownHints.length>0){
    hintsHtml='<div class="hint-box mb-4"><div class="px-3 py-2 border-b border-amber-500/10"><span class="text-xs text-amber-400 font-semibold">\uD83D\uDCA1 Подсказки ('+shownHints.length+'/'+hints.length+')</span></div>';
    for(var i=0;i<shownHints.length;i++){hintsHtml+='<div class="px-3 py-2 text-xs text-gray-300 border-b border-amber-500/5 last:border-0">'+esc(shownHints[i])+'</div>';}
    hintsHtml+='</div>';
  }
  var deepHintHtml="";
  if(S.deepHintShown){
    deepHintHtml='<div class="deep-hint-box mb-4"><div class="px-3 py-2 border-b border-red-500/10"><span class="text-xs text-red-400 font-semibold">\uD83D\uDD13 Полный ответ:</span></div>'+
      '<div class="code-editor px-3 py-2 m-2 rounded text-sm whitespace-pre-wrap">'+esc(p.solution)+'</div></div>';
  }
  var r=S.pracRes;var rh="";
  if(r){
    var cls=r.success?"bg-green-500/10 border border-green-500/30":"bg-red-500/10 border border-red-500/30";
    var icon=r.success?"\uD83C\uDF89":"\u274C";var col=r.success?"text-green-400":"text-red-400";
    var msg=r.success?"Отлично! Практика пройдена!":"Есть ошибки \u2014 исправьте код";
    rh='<div class="rounded-xl p-3 mb-4 '+cls+'"><div class="flex items-center gap-2"><span class="text-lg">'+icon+'</span><span class="font-semibold '+col+' text-sm">'+msg+'</span></div>';
    if(!r.success&&r.detail)rh+='<p class="text-xs text-red-300 mt-1">'+r.detail+'</p>';
    if(!r.success&&r.diffLines){
      rh+='<div class="mt-2 rounded-lg p-2 text-xs space-y-0.5" style="background:#1a1a2e;border:1px solid rgba(255,255,255,.1)">';
      for(var d=0;d<r.diffLines.length;d++){var dl=r.diffLines[d];var lineCls=dl.type==='ok'?'line-ok':'line-err';rh+='<div class="'+lineCls+' font-mono text-xs">'+esc(dl.text)+'</div>';}
      rh+='</div>';
    }
    rh+='</div>';
  }
  var nb="";
  if(r&&r.success){nb='<button onclick="finishPractice()" class="btn-primary px-6 py-3 rounded-xl text-white text-sm font-semibold w-full">\u2705 Готово! Вернуться к курсу</button>';}
  var hintBtn="";var deepBtn="";
  if(!r||!r.success){
    if(S.hintLevel<hints.length)hintBtn='<button onclick="showHint()" class="btn-hint px-4 py-2 rounded-lg text-xs font-semibold">\uD83D\uDCA1 Подсказка ('+S.hintLevel+'/'+hints.length+')</button>';
    if(allHintsUsed && !S.deepHintShown)deepBtn='<button onclick="showDeepHint()" class="btn-deep px-4 py-2 rounded-lg text-xs font-semibold">\uD83D\uDD13 Показать ответ</button>';
  }
  return '<div class="min-h-screen hero-gradient pb-8">'+
    '<header class="glass-strong sticky top-0 z-50"><div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">'+
    '<button onclick="S.page=\'course\';S.pracRes=null;render()" class="text-gray-400 hover:text-white text-sm">\u2190 Назад</button>'+
    '<h2 class="text-xs font-bold text-gray-300">\u270D\uFE0F '+esc(p.title)+'</h2><div class="w-12"></div></div></header>'+
    '<div class="max-w-4xl mx-auto px-4 py-6">'+
    '<div class="glass-strong rounded-2xl p-6 slide-up">'+
    '<div class="flex items-center gap-3 mb-4"><div class="w-9 h-9 rounded-lg bg-amber-500/20 flex items-center justify-center text-amber-400">\u270D\uFE0F</div>'+
    '<h3 class="text-lg font-bold text-white">'+esc(p.title)+'</h3></div>'+
    '<div class="task-desc mb-4"><p class="text-xs text-purple-300 mb-1">\uD83D\uDCCB Задание:</p>'+
    '<p class="text-sm text-white leading-relaxed">'+esc(p.task)+'</p></div>'+
    '<div class="mb-4"><div class="flex items-center justify-between mb-1">'+
    '<label class="text-xs text-gray-400">\u270F\uFE0F Ваш код:</label>'+
    '<button onclick="dismissKb()" class="btn-kb px-3 py-1 rounded-lg text-xs flex items-center gap-1">\u2328\uFE0F <span class="hidden sm:inline">Скрыть</span></button></div>'+

    hintsHtml+deepHintHtml+rh+
    '<div class="space-y-2"><div class="flex flex-wrap gap-2">'+
    '<button onclick="checkCode()" class="btn-primary px-5 py-3 rounded-lg text-white text-sm font-semibold flex-1 min-w-[140px]">\u2705 Проверить</button>'+
    hintBtn+deepBtn+'</div>'+nb+'</div></div></div></div>';
}

function showHint(){S.hintLevel++;render()}
function showDeepHint(){S.deepHintShown=true;render()}
function checkCode(){
  var el=document.getElementById("pcode");if(!el){alert("Ошибка");return}
  var code=el.value.trim();if(!code){alert("Напишите код!");return}
  var course=getCourse(S.curCourse);if(!course)return;
  var p=null;for(var i=0;i<(course.practices||[]).length;i++){if(course.practices[i].id===S.curPracId){p=course.practices[i];break}}
  if(!p)return;
  var result=checkFullScript(code,p.solution);
  S.pracRes={code:code,success:result.ok,detail:result.msg,diffLines:result.diffLines};render();
}
function checkFullScript(userCode,correctCode){
  function normalize(code){return code.replace(/\r\n/g,'\n').replace(/[ \t]+$/gm,'').replace(/  +/g,' ').replace(/^\s+/gm,'').trim().toLowerCase()}
  var nu=normalize(userCode);var nc=normalize(correctCode);
  if(nu===nc)return{ok:true,msg:"Идеальное решение!",diffLines:[]};
  var userLines=nu.split('\n').filter(function(l){return l.trim()});
  var correctLines=nc.split('\n').filter(function(l){return l.trim()});
  if(userLines.length===0)return{ok:false,msg:"Код пустой. Напишите хотя бы одну строку.",diffLines:[]};
  var diffLines=[];var usedUserLines=[];var matchedCount=0;
  for(var i=0;i<correctLines.length;i++){
    var cLine=correctLines[i].trim();var found=false;
    for(var j=0;j<userLines.length;j++){
      if(usedUserLines.indexOf(j)!==-1)continue;
      var uLine=userLines[j].trim();
      var cTokens=cLine.replace(/["'(){};,=.]/g,' ').split(/\s+/).filter(function(t){return t.length>0});
      var hasAll=true;for(var k=0;k<cTokens.length;k++){if(uLine.indexOf(cTokens[k])===-1){hasAll=false;break}}
      if(hasAll){usedUserLines.push(j);matchedCount++;found=true;break}
    }
    if(!found)diffLines.push({type:'err',text:'\u26A0\uFE0F Не хватает: '+correctLines[i]});
  }
  for(var m=0;m<userLines.length;m++){if(usedUserLines.indexOf(m)===-1){diffLines.push({type:'err',text:'\u2753 Лишняя строка: '+userLines[m]})}}
  if(matchedCount===correctLines.length && userLines.length===correctLines.length)return{ok:true,msg:"Все строки верны!",diffLines:[]};
  if(matchedCount===correctLines.length)return{ok:true,msg:"Все нужные строки найдены!",diffLines:diffLines};
  var ratio=correctLines.length>0?matchedCount/correctLines.length:0;
  var msg='Найдено '+matchedCount+' из '+correctLines.length+' строк.';
  if(ratio>=0.5)msg+=' Почти, проверьте ошибки ниже.';else msg+=' Попробуйте ещё раз.';
  return{ok:false,msg:msg,diffLines:diffLines};
}
function finishPractice(){
  var course=getCourse(S.curCourse);if(!course)return;
  var p=getCourseProgress(course.id);
  if(p.completedPractices.indexOf(S.curPracId)===-1)p.completedPractices.push(S.curPracId);
  S.progress[course.id]=p;
  tryUnlockNextCourse(course.id);
  save();S.page="course";S.curPracId=null;S.pracRes=null;S.hintLevel=0;S.deepHintShown=false;render();
}

function rComplete(){

  var next=null;
  for(var j=0;j<S.courses.length;j++){if(S.courses[j].id===course.id){if(j+1<S.courses.length&&S.courses[j+1].locked){next=S.courses[j+1]}break}}
  var nh="",nb="";
  if(next){nh='<div class="glass rounded-xl p-3 mb-5 border-amber-500/30"><p class="text-xs text-amber-400 mb-1">\uD83D\uDD13 Новый курс разблокирован!</p><p class="text-white font-semibold text-sm">'+next.icon+' '+esc(next.title)+'</p></div>';nb='<button onclick="goCourse('+next.id+')" class="btn-secondary px-5 py-2 rounded-lg text-amber-400 text-sm" style="border-color:rgba(245,158,11,.3)">Начать '+esc(next.title)+'</button>';}
  return '<div class="min-h-screen hero-gradient flex items-center justify-center">'+
    '<div class="max-w-md mx-auto px-4 text-center">'+
    '<div class="glass-strong rounded-3xl p-8 slide-up" style="animation:celebrate .6s ease">'+
    '<div class="text-5xl mb-4">\uD83C\uDFC6</div>'+
    '<h2 class="text-2xl font-bold text-white mb-1 shimmer-text">Курс пройден!</h2>'+
    '<p class="text-gray-400 text-sm mb-6">'+esc(course.title)+'</p>'+
    '<div class="grid grid-cols-3 gap-3 mb-6">'+
    '<div class="glass rounded-lg p-2"><div class="text-xl font-bold text-white">'+course.levels.length+'</div><div class="text-[10px] text-gray-500">Уровней</div></div>'+
    '<div class="glass rounded-lg p-2"><div class="text-xl font-bold text-green-400">100%</div><div class="text-[10px] text-gray-500">Прогресс</div></div>'+
    '<div class="glass rounded-lg p-2"><div class="text-xl font-bold text-amber-400">\u2B50</div><div class="text-[10px] text-gray-500">Рейтинг</div></div></div>'+
    nh+
    '<div class="flex gap-2 justify-center">'+
    '<button onclick="goHome()" class="btn-primary px-5 py-2 rounded-lg text-white text-sm font-semibold">\uD83D\uDCDA Курсы</button>'+nb+'</div></div></div></div>';
}

function initParticles(){
  var canvases=document.querySelectorAll(".particle-canvas");
  for(var c=0;c<canvases.length;c++){
    (function(cv){if(cv._p)return;cv._p=true;var st=cv.getAttribute("data-status");var cl=cv.getAttribute("data-color");var ctx=cv.getContext("2d");
    function rsz(){var r=cv.parentElement.getBoundingClientRect();cv.width=r.width;cv.height=r.height}rsz();
    var pts=[];var n=st==="active"?12:(st==="done"?6:3);
    for(var i=0;i<n;i++)pts.push({x:Math.random()*150,y:Math.random()*40,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,sz:Math.random()*1.5+.5,al:Math.random()*.4+.1});
    (function anim(){ctx.clearRect(0,0,cv.width,cv.height);rsz();for(var i=0;i<pts.length;i++){var p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>cv.width)p.vx*=-1;if(p.y<0||p.y>cv.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fillStyle=cl+Math.round(p.al*255).toString(16).padStart(2,"0");ctx.fill()}requestAnimationFrame(anim)})();})(canvases[c]);
  }
}
function launchFW(){
  var cv=document.getElementById("fw-canvas");if(!cv)return;var ctx=cv.getContext("2d");cv.width=window.innerWidth;cv.height=window.innerHeight;
  var fws=[],sps=[],cls=["#6c5ce7","#a855f7","#ec4899","#f59e0b","#10b981","#3b82f6","#ef4444"];
  function mkF(){var x=Math.random()*cv.width;var ty=Math.random()*cv.height*.4+50;fws.push({x:x,y:cv.height,ty:ty,vy:-7-Math.random()*4,cl:cls[Math.floor(Math.random()*cls.length)],ex:false})}
  function exp(x,y,cl){for(var i=0;i<50;i++){var a=(Math.PI*2/50)*i+Math.random()*.2;var sp=2+Math.random()*3;sps.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,cl:cl,life:1,dc:.015+Math.random()*.015,sz:2+Math.random()*2})}}
  var fr=0;(function anim(){if(fr>200){ctx.clearRect(0,0,cv.width,cv.height);return}fr++;ctx.fillStyle="rgba(10,10,15,.2)";ctx.fillRect(0,0,cv.width,cv.height);
  if(fr%25===0)mkF();for(var i=0;i<fws.length;i++){var f=fws[i];if(!f.ex){f.y+=f.vy;f.vy+=.1;ctx.beginPath();ctx.arc(f.x,f.y,3,0,Math.PI*2);ctx.fillStyle=f.cl;ctx.fill();if(f.y<=f.ty||f.vy>0){f.ex=true;exp(f.x,f.y,f.cl)}}}
  for(var j=0;j<sps.length;j++){var s=sps[j];s.x+=s.vx;s.y+=s.vy;s.vy+=.05;s.life-=s.dc;if(s.life>0){ctx.beginPath();ctx.arc(s.x,s.y,s.sz*s.life,0,Math.PI*2);ctx.fillStyle=s.cl+Math.round(s.life*255).toString(16).padStart(2,"0");ctx.fill()}}
  requestAnimationFrame(anim)})();
}
load();defaults();render();
window.addEventListener("resize",function(){var f=document.getElementById("fw-canvas");if(f){f.width=window.innerWidth;f.height=window.innerHeight}});
</script>
