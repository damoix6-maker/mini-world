<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini World Creata - Скрипты</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a0f;color:#e0e0e0;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#1a1a2e}::-webkit-scrollbar-thumb{background:#6c5ce7;border-radius:3px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 5px rgba(108,92,231,.3)}50%{box-shadow:0 0 20px rgba(108,92,231,.6)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes celebrate{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes savedPop{0%{opacity:0;transform:translateY(-5px)}100%{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.slide-up{animation:slideUp .4s ease forwards}
.glass{background:rgba(255,255,255,.03);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06)}
.glass-strong{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1)}
.btn-primary{background:linear-gradient(135deg,#6c5ce7,#a855f7);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(108,92,231,.4)}
.btn-hint{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24;transition:all .3s;cursor:pointer}
.btn-hint:hover{background:rgba(245,158,11,.2)}
.btn-deep{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;transition:all .3s;cursor:pointer;animation:shake .5s ease}
.btn-deep:hover{background:rgba(239,68,68,.2)}
.btn-export{background:linear-gradient(135deg,#10b981,#059669);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-export:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(16,185,129,.4)}
.btn-import{background:linear-gradient(135deg,#3b82f6,#2563eb);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-import:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(59,130,246,.4)}
.btn-copy{background:linear-gradient(135deg,#f59e0b,#d97706);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-copy:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(245,158,11,.4)}
.btn-tg{background:linear-gradient(135deg,#0088cc,#229ED9);transition:all .3s;border:none;cursor:pointer;color:#fff}
.btn-tg:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,136,204,.4)}
.btn-secondary{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:all .3s;cursor:pointer;color:#ccc}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;transition:all .3s;cursor:pointer}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-kb{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:all .3s;cursor:pointer;color:#888;font-size:18px}
.btn-kb:hover{background:rgba(255,255,255,.1);color:#e0e0e0}
.card-hover{transition:all .3s;position:relative;overflow:hidden}
.card-hover:hover{transform:translateY(-4px)}
.card-hover:hover .card-bg{opacity:.15}
.card-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(168,85,247,.05));transition:opacity .4s;opacity:0}
.level-card{transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
.level-card:hover:not(.locked){transform:scale(1.01)}
.level-card.locked{opacity:.4;cursor:not-allowed;filter:grayscale(.5)}
.prac-card{transition:all .3s;cursor:pointer;position:relative;overflow:hidden;border-left:3px solid #f59e0b}
.prac-card:hover{transform:scale(1.01)}
.prac-card.done{border-left-color:#00d26a}
.prac-card.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.5)}
.particle-canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
input,textarea,select{background:rgba(255,255,255,.05)!important;border:1px solid rgba(255,255,255,.1)!important;color:#e0e0e0!important;transition:all .3s;border-radius:.5rem}
input:focus,textarea:focus,select:focus{border-color:#6c5ce7!important;box-shadow:0 0 15px rgba(108,92,231,.2)!important;outline:none!important}
.code-editor{font-family:'Consolas','Monaco',monospace;background:#1a1a2e!important;border:1px solid rgba(108,92,231,.3)!important;color:#a8e6cf!important;line-height:1.6}
.progress-bar{background:linear-gradient(90deg,#6c5ce7,#a855f7);transition:width .6s}
.shimmer-text{background:linear-gradient(90deg,#6c5ce7,#a855f7,#6c5ce7);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
.hero-gradient{background:radial-gradient(ellipse at 50% 0%,rgba(108,92,231,.15) 0%,transparent 60%),#0a0a0f}
.badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
.badge-purple{background:rgba(108,92,231,.15);color:#a78bfa;border:1px solid rgba(108,92,231,.3)}
.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.badge-green{background:rgba(0,210,106,.15);color:#00d26a;border:1px solid rgba(0,210,106,.3)}
.badge-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.tab-btn{transition:all .2s;border-bottom:2px solid transparent;padding-bottom:6px;cursor:pointer}
.tab-btn.active{color:#a855f7;border-bottom-color:#a855f7}
.tab-btn:hover{color:#a855f7}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;animation:savedPop .3s ease forwards}
.toast-success{background:rgba(0,210,106,.2);border:1px solid rgba(0,210,106,.4);color:#00d26a}
.toast-unlock{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);color:#fbbf24}
.toast-error{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#f87171}
.toast-info{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);color:#60a5fa}
.hint-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;overflow:hidden;transition:all .3s}
.deep-hint-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;overflow:hidden}
.task-desc{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.2);border-radius:8px;padding:12px}
.drop-zone{border:2px dashed rgba(255,255,255,.15);transition:all .3s}
.drop-zone:hover,.drop-zone.dragover{border-color:rgba(108,92,231,.5);background:rgba(108,92,231,.05)}
</style>
</head>
<body>
<canvas id="fw-canvas" style="position:fixed;inset:0;z-index:9998;pointer-events:none"></canvas>
<div id="app"></div>
<script>
var S={
  page:"home",courses:[],progress:{},
  curCourse:null,curLevelIdx:-1,curPracId:null,pracRes:null,
  hintLevel:0,deepHintShown:false,
  testPracs:[],testIdx:0
};

function save(){try{localStorage.setItem("mwc_c",JSON.stringify(S.courses));localStorage.setItem("mwc_p",JSON.stringify(S.progress))}catch(e){}}
function load(){try{var c=localStorage.getItem("mwc_c");var p=localStorage.getItem("mwc_p");if(c)S.courses=JSON.parse(c);if(p)S.progress=JSON.parse(p)}catch(e){}}
function defaults(){if(S.courses.length===0){S.courses=[];save()}}
function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function showToast(msg,type){
  var old=document.querySelector(".toast");if(old)old.remove();
  var t=document.createElement("div");t.className="toast toast-"+(type||"success");
  t.textContent=msg;document.body.appendChild(t);setTimeout(function(){if(t.parentNode)t.remove()},3000);
}
function dismissKb(){var el=document.getElementById("pcode");if(el){el.blur()}}
function getCourse(id){for(var i=0;i<S.courses.length;i++){if(S.courses[i].id===id)return S.courses[i]}return null}
function goHome(){S.page="home";S.curCourse=null;render()}
function goCourse(id){S.curCourse=id;S.curLevelIdx=-1;S.curPracId=null;S.page="course";render()}
function getCourseProgress(cid){var p=S.progress[cid];if(!p)return{completedLevels:[],completedPractices:[]};return p}
function isLevelRead(cid,lidx){return getCourseProgress(cid).completedLevels.indexOf(lidx)!==-1}
function isPracDone(cid,pid){return getCourseProgress(cid).completedPractices.indexOf(pid)!==-1}

function isLevelUnlocked(cid,lidx){
  var course=getCourse(cid);if(!course)return false;
  if(lidx===0)return true;
  var prevIdx=lidx-1;
  if(!isLevelRead(cid,prevIdx))return false;
  var prevPracs=getPracsForLevel(course,prevIdx);
  for(var i=0;i<prevPracs.length;i++){
    if(!isPracDone(cid,prevPracs[i].id))return false;
  }
  return true;
}

function isPracUnlocked(cid,lidx){return isLevelRead(cid,lidx)}
function getPracsForLevel(course,lidx){
  var ps=course.practices||[];var r=[];
  for(var i=0;i<ps.length;i++){if(ps[i].levelIdx===lidx&&!ps[i].isTest)r.push(ps[i])}return r;
}
function isCourseComplete(cid){
  var course=getCourse(cid);if(!course)return false;var p=getCourseProgress(cid);
  if(p.completedLevels.length<course.levels.length)return false;
  for(var i=0;i<(course.practices||[]).length;i++){if(!isPracDone(cid,course.practices[i].id))return false}
  return true;
}
function countLevels(cid){var course=getCourse(cid);return course?course.levels.length:0}
function countDoneLevels(cid){return getCourseProgress(cid).completedLevels.length}

function tryUnlockNextCourse(cid){
  if(!isCourseComplete(cid))return;
  var idx=-1;for(var i=0;i<S.courses.length;i++){if(S.courses[i].id===cid){idx=i;break}}
  if(idx<0)return;
  if(idx+1<S.courses.length&&S.courses[idx+1].locked){S.courses[idx+1].locked=false;save();showToast("\uD83D\uDD13 "+S.courses[idx+1].title+" разблокирован!","unlock")}
}

function deleteCourseFromMenu(id){
  if(!confirm("Вы уверены, что хотите удалить этот курс? Прогресс также будет удален."))return;
  S.courses = S.courses.filter(function(c){return c.id !== id});
  delete S.progress[id];
  save();
  showToast("\uD83D\uDDD1\uFE0F Курс удален","info");
  render();
}

function copyCourses(){
  try{var json=JSON.stringify(S.courses,null,2);
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(json).then(function(){showToast("\u2705 Курсы скопированы! ("+S.courses.length+")","info")}).catch(function(){fallbackCopy(json)})}
  else{fallbackCopy(json)}
  }catch(e){showToast("\u274C Ошибка","error")}
}
function fallbackCopy(text){var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");showToast("\u2705 Скопировано!","info")}catch(e){showToast("\u274C Ошибка","error")}document.body.removeChild(ta)}
function downloadCourses(){
  var data={courses:JSON.parse(JSON.stringify(S.courses)),version:1};var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="mwc_courses_"+Date.now()+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast("\u2705 Скачано!","success");
}

function processImport(text){
  try{
    var data=JSON.parse(text);var courses=null;
    if(data.courses&&Array.isArray(data.courses))courses=data.courses;
    else if(Array.isArray(data))courses=data;
    else if(data.data&&Array.isArray(data.data))courses=data.data;
    if(!courses){showToast("\u274C Неверный формат JSON","error");return false}
    for(var i=0;i<courses.length;i++){if(!courses[i].title||!courses[i].levels){showToast("\u274C Курс '"+(courses[i].title||i)+"' некорректен","error");return false}}
    var added=0;for(var j=0;j<courses.length;j++){var exists=false;for(var k=0;k<S.courses.length;k++){if(S.courses[k].id===courses[j].id){exists=true;break}}if(!exists){S.courses.push(courses[j]);added++}}
    if(added>0){save();showToast("\u2705 Импортировано "+added+" курсов!","success");render();return true}
    else{showToast("\u26A0\uFE0F Все курсы уже есть","info");return true}
  }catch(e){showToast("\u274C Ошибка чтения: "+e.message,"error");return false}
}

function handleFileSelect(files){
  if(!files||files.length===0)return;
  var file=files[0];
  
  if(file.name.toLowerCase().endsWith('.zip')){
    JSZip.loadAsync(file).then(function(zip){
      var promises=[];
      zip.forEach(function(relativePath, zipEntry){
        if(!zipEntry.dir && (zipEntry.name.toLowerCase().endsWith('.json') || zipEntry.name.toLowerCase().endsWith('.txt'))){
          promises.push(zipEntry.async("string").then(function(content){
            return {name:zipEntry.name, content:content};
          }));
        }
      });
      Promise.all(promises).then(function(results){
        if(results.length===0){showToast("\u274C В архиве нет JSON/TXT файлов","error");return}
        var totalAdded=0;
        results.forEach(function(res){
          try{
            var data=JSON.parse(res.content);var courses=null;
            if(data.courses&&Array.isArray(data.courses))courses=data.courses;
            else if(Array.isArray(data))courses=data;
            else if(data.data&&Array.isArray(data.data))courses=data.data;
            if(courses){
              courses.forEach(function(c){
                var exists=false;
                for(var k=0;k<S.courses.length;k++){if(S.courses[k].id===c.id){exists=true;break}}
                if(!exists){S.courses.push(c);totalAdded++}
              });
            }
          }catch(e){console.log("Error parsing "+res.name, e)}
        });
        if(totalAdded>0){save();showToast("\u2705 Из ZIP добавлено "+totalAdded+" курсов!","success");render()}
        else{showToast("\u26A0\uFE0F Новые курсы из ZIP не найдены","info")}
      });
    }).catch(function(e){showToast("\u274C Ошибка чтения ZIP: "+e.message,"error")});
  } else {
    var reader=new FileReader();
    reader.onload=function(e){processImport(e.target.result)};
    reader.readAsText(file);
  }
}

function triggerImport(){var input=document.createElement("input");input.type="file";input.accept=".json,.txt,.zip";input.onchange=function(e){handleFileSelect(e.target.files)};input.click()}
function importFromTextarea(){var el=document.getElementById("import-text");if(!el)return;var text=el.value.trim();if(!text){showToast("\u274C Вставьте JSON","error");return}processImport(text);el.value=""}
function setupDropZone(){var dz=document.getElementById("drop-zone");if(!dz)return;dz.addEventListener("dragover",function(e){e.preventDefault();dz.classList.add("dragover")});dz.addEventListener("dragleave",function(){dz.classList.remove("dragover")});dz.addEventListener("drop",function(e){e.preventDefault();dz.classList.remove("dragover");handleFileSelect(e.dataTransfer.files)})}

function render(){var app=document.getElementById("app");if(!app)return;var html="";
  if(S.page==="home")html=rHome();
  else if(S.page==="course")html=rCourse();
  else if(S.page==="readLevel")html=rReadLevel();
  else if(S.page==="testMode")html=rTestMode();
  else if(S.page==="doPractice")html=rDoPractice();
  else if(S.page==="complete")html=rComplete();
  app.innerHTML=html;setTimeout(function(){initParticles();setupDropZone()},100);
}

function rHome(){
  if(S.courses.length===0){
    return '<div class="min-h-screen hero-gradient pb-8">'+
    '<header class="glass-strong sticky top-0 z-50"><div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">'+
    '<div class="flex items-center gap-2"><div class="w-9 h-9 rounded-xl flex items-center justify-center text-lg" style="animation:pulseGlow 3s infinite;background:linear-gradient(135deg,#6c5ce7,#a855f7)">'+
    '\uD83C\uDFAE</div><div><h1 class="text-base font-bold text-white leading-tight">Mini World Creata</h1><p class="text-[10px] text-gray-500">Изучение скриптов</p></div></div></div></header>'+
    '<section class="max-w-lg mx-auto px-4 pt-20 text-center slide-up"><div class="glass-strong rounded-3xl p-10">'+
    '<div class="text-6xl mb-4" style="animation:float 3s ease infinite">\uD83D\uDCDA</div>'+
    '<h2 class="text-2xl font-bold text-white mb-3">Добро пожаловать!</h2>'+
    '<p class="text-gray-400 text-sm mb-6 leading-relaxed">курсы можно скачать в нашем Телеграмм канале <span class="text-blue-400 font-semibold">@miniworldcreate</span></p>'+
    '<a href="https://t.me/miniworldcreate" target="_blank" class="btn-tg inline-flex items-center justify-center gap-2 px-8 py-3 rounded-xl text-white font-semibold text-base mb-4">'+
    '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>'+
    'Зайти в канал</a>'+
    '<div class="mt-4 border-t border-white/5 pt-4"><p class="text-xs text-gray-500 mb-2">Есть файл? Импортируйте его ниже:</p>'+
    '<textarea id="import-text" rows="2" placeholder="Вставьте JSON..." class="w-full px-3 py-2 rounded-lg text-xs resize-none code-editor mb-2"></textarea>'+
    '<div class="flex gap-2"><button onclick="importFromTextarea()" class="btn-secondary flex-1 py-2 rounded-lg text-white text-xs font-semibold">\u2B06\uFE0F Вставить</button>'+
    '<button onclick="triggerImport()" class="btn-import flex-1 py-2 rounded-lg text-white text-xs font-semibold">\uD83D\uDCC1 Файл/ZIP</button></div></div></div></section></div>';
  }
  var h="";
  for(var i=0;i<S.courses.length;i++){
    var c=S.courses[i];var done=isCourseComplete(c.id);var lock=c.locked&&!done;
    var tot=countLevels(c.id);var d=countDoneLevels(c.id);var pct=tot>0?Math.round(d/tot*100):0;
    var btn=d>0&&d<tot?"Продолжить":"Начать";
    
    h+='<div class="card-hover glass rounded-2xl p-5 slide-up" style="animation-delay:'+i*.1+'s">';
    h+='<div class="card-bg rounded-2xl"></div><div class="relative z-10 flex flex-col h-full">';
    
    h+='<div class="flex items-start justify-between gap-3 mb-3">';
    h+='<div class="flex items-center gap-3 min-w-0 flex-1" onclick="';
    if(!lock)h+='goCourse('+c.id+')';
    h+='">';
    h+='<div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl flex-shrink-0" style="background:'+c.color+'22;border:1px solid '+c.color+'44">'+c.icon+'</div>';
    h+='<div class="min-w-0"><h3 class="text-lg font-bold text-white truncate leading-tight">'+esc(c.title)+'</h3>';
    if(lock)h+='<span class="text-xs text-gray-500">\uD83D\uDD12 Заблокирован</span>';
    if(done)h+='<span class="text-xs text-green-400">\u2705 Пройден</span>';
    h+='</div></div>';
    h+='<button onclick="event.stopPropagation();deleteCourseFromMenu('+c.id+')" class="btn-danger px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap flex-shrink-0">\u2716 Удалить</button>';
    h+='</div>';
    
    h+='<p class="text-gray-400 text-xs mb-3 line-clamp-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc(c.description)+'</p>';
    
    h+='<div class="mt-auto">';
    h+='<div class="flex items-center gap-2 mb-3"><div class="flex-1 h-1.5 bg-white/5 rounded-full overflow-hidden"><div class="progress-bar h-full rounded-full" style="width:'+pct+'%"></div></div>';
    h+='<span class="text-xs text-gray-500">'+d+'/'+tot+' ур.</span></div>';
    
    if(lock)h+='<button disabled class="w-full py-2 rounded-lg bg-white/5 text-gray-500 text-xs cursor-not-allowed">\uD83D\uDD12 Заблокирован</button>';

function checkCode(){
  var el=document.getElementById("pcode");if(!el){alert("Ошибка");return}
  var code=el.value.trim();if(!code){alert("Напишите код!");return}
  var course=getCourse(S.curCourse);if(!course)return;var p=null;
  if(S.page==="testMode"){p=S.testPracs[S.testIdx]}else{for(var i=0;i<(course.practices||[]).length;i++){if(course.practices[i].id===S.curPracId){p=course.practices[i];break}}}
  if(!p)return;var result=checkFullScript(code,p.solution);
  S.pracRes={code:code,success:result.ok,detail:result.msg,diffLines:result.diffLines};render();
}

function checkFullScript(userCode, correctCode) {
  function normalize(code) {
    return code.replace(/\s+/g, '').toLowerCase();
  }
  var nu = normalize(userCode);
  var nc = normalize(correctCode);
  if (nu === nc) return { ok: true, msg: "\u0418\u0434\u0435\u0430\u043B\u044C\u043D\u043E\u0435 \u0440\u0435\u0448\u0435\u043D\u0438\u0435!", diffLines: [] };
  if (nu.length < nc.length * 0.8) {
    return { ok: false, msg: "\u041A\u043E\u0434 \u0441\u043B\u0438\u0448\u043A\u043E\u043C \u043A\u043E\u0440\u043E\u0442\u043A\u0438\u0439. \u041D\u0430\u043F\u0438\u0448\u0438\u0442\u0435 \u043F\u043E\u043B\u043D\u044B\u0439 \u0441\u043A\u0440\u0438\u043F\u0442.", diffLines: [] };
  }
  function splitLines(code) {
    return code.replace(/\r\n/g, '\n').split('\n').filter(function(l) { return l.trim().length > 0; });
  }
  var userLines = splitLines(userCode);
  var correctLines = splitLines(correctCode);
  var diffLines = [];
  var matchedCount = 0;
  var usedUserLines = [];
  for (var i = 0; i < correctLines.length; i++) {
    var normCorrect = normalize(correctLines[i]);
    var found = false;
    for (var j = 0; j < userLines.length; j++) {
      if (usedUserLines.indexOf(j) !== -1) continue;
      var normUser = normalize(userLines[j]);
      if (normUser === normCorrect) {
        usedUserLines.push(j);
        matchedCount++;
        found = true;
        break;
      }
    }
    if (!found) {
      diffLines.push({ type: 'err', text: '\u274C \u041D\u0435 \u043D\u0430\u0439\u0434\u0435\u043D\u0430 \u0441\u0442\u0440\u043E\u043A\u0430 ' + (i + 1) });
    }
  }
  for (var m = 0; m < userLines.length; m++) {
    if (usedUserLines.indexOf(m) === -1) {
      diffLines.push({ type: 'err', text: '\u26A0\uFE0F \u041B\u0438\u0448\u043D\u044F\u044F \u0441\u0442\u0440\u043E\u043A\u0430: ' + userLines[m] });
    }
  }
  if (matchedCount === correctLines.length && usedUserLines.length === userLines.length) {
    return { ok: true, msg: "\u0412\u0441\u0435 \u0441\u0442\u0440\u043E\u043A\u0438 \u0432\u0435\u0440\u043D\u044B!", diffLines: [] };
  }
  if (matchedCount === correctLines.length) {
    return { ok: true, msg: "\u0412\u0441\u0435 \u043D\u0443\u0436\u043D\u044B\u0435 \u0441\u0442\u0440\u043E\u043A\u0438 \u043D\u0430\u0439\u0434\u0435\u043D\u044B!", diffLines: diffLines };
  }
  var ratio = correctLines.length > 0 ? matchedCount / correctLines.length : 0;
  var msg = '\u041D\u0430\u0439\u0434\u0435\u043D\u043E ' + matchedCount + ' \u0438\u0437 ' + correctLines.length + ' \u0441\u0442\u0440\u043E\u043A.';
  if (ratio >= 0.5) msg += ' \u041F\u043E\u0447\u0442\u0438, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u043E\u0448\u0438\u0431\u043A\u0438.';
  else msg += ' \u041F\u043E\u043F\u0440\u043E\u0431\u0443\u0439\u0442\u0435 \u0435\u0449\u0451 \u0440\u0430\u0437.';
  return { ok: false, msg: msg, diffLines: diffLines };
}

function finishPractice(){
  var course=getCourse(S.curCourse);if(!course)return;
  var p=getCourseProgress(course.id);if(p.completedPractices.indexOf(S.curPracId)===-1)p.completedPractices.push(S.curPracId);
  S.progress[course.id]=p;tryUnlockNextCourse(course.id);save();
  S.page="course";S.curPracId=null;S.pracRes=null;S.hintLevel=0;S.deepHintShown=false;render();
}

function rComplete(){
  var course=getCourse(S.curCourse);if(!course)return "";
  return '<div class="min-h-screen hero-gradient flex items-center justify-center">'+
    '<div class="max-w-md mx-auto px-4 text-center">'+
    '<div class="glass-strong rounded-3xl p-8 slide-up" style="animation:celebrate .6s ease">'+
    '<div class="text-5xl mb-4">\uD83C\uDFC6</div><h2 class="text-2xl font-bold text-white mb-1 shimmer-text">Курс пройден!</h2>'+
    '<p class="text-gray-400 text-sm mb-6">'+esc(course.title)+'</p>'+
    '<div class="flex gap-2 justify-center"><button onclick="goHome()" class="btn-primary px-5 py-2 rounded-lg text-white text-sm font-semibold">\uD83D\uDCDA Курсы</button></div></div></div></div>';
}

function initParticles(){
  var canvases=document.querySelectorAll(".particle-canvas");
  for(var c=0;c<canvases.length;c++){
    (function(cv){if(cv._p)return;cv._p=true;var st=cv.getAttribute("data-status");var cl=cv.getAttribute("data-color");var ctx=cv.getContext("2d");
    function rsz(){var r=cv.parentElement.getBoundingClientRect();cv.width=r.width;cv.height=r.height}rsz();
    var pts=[];var n=st==="active"?12:(st==="done"?6:3);
    for(var i=0;i<n;i++)pts.push({x:Math.random()*150,y:Math.random()*40,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,sz:Math.random()*1.5+.5,al:Math.random()*.4+.1});
    (function anim(){ctx.clearRect(0,0,cv.width,cv.height);rsz();for(var i=0;i<pts.length;i++){var p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>cv.width)p.vx*=-1;if(p.y<0||p.y>cv.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fillStyle=cl+Math.round(p.al*255).toString(16).padStart(2,"0");ctx.fill()}requestAnimationFrame(anim)})();})(canvases[c]);
  }
}
function launchFW(){
  var cv=document.getElementById("fw-canvas");if(!cv)return;var ctx=cv.getContext("2d");cv.width=window.innerWidth;cv.height=window.innerHeight;
  var fws=[],sps=[],cls=["#6c5ce7","#a855f7","#ec4899","#f59e0b","#10b981","#3b82f6","#ef4444"];
  function mkF(){var x=Math.random()*cv.width;var ty=Math.random()*cv.height*.4+50;fws.push({x:x,y:cv.height,ty:ty,vy:-7-Math.random()*4,cl:cls[Math.floor(Math.random()*cls.length)],ex:false})}
  function exp(x,y,cl){for(var i=0;i<50;i++){var a=(Math.PI*2/50)*i+Math.random()*.2;var sp=2+Math.random()*3;sps.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,cl:cl,life:1,dc:.015+Math.random()*.015,sz:2+Math.random()*2})}}
  var fr=0;(function anim(){if(fr>200){ctx.clearRect(0,0,cv.width,cv.height);return}fr++;ctx.fillStyle="rgba(10,10,15,.2)";ctx.fillRect(0,0,cv.width,cv.height);
  if(fr%25===0)mkF();for(var i=0;i<fws.length;i++){var f=fws[i];if(!f.ex){f.y+=f.vy;f.vy+=.1;ctx.beginPath();ctx.arc(f.x,f.y,3,0,Math.PI*2);ctx.fillStyle=f.cl;ctx.fill();if(f.y<=f.ty||f.vy>0){f.ex=true;exp(f.x,f.y,f.cl)}}}
  for(var j=0;j<sps.length;j++){var s=sps[j];s.x+=s.vx;s.y+=s.vy;s.vy+=.05;s.life-=s.dc;if(s.life>0){ctx.beginPath();ctx.arc(s.x,s.y,s.sz*s.life,0,Math.PI*2);ctx.fillStyle=s.cl+Math.round(s.life*255).toString(16).padStart(2,"0");ctx.fill()}}
  requestAnimationFrame(anim)})();
}
load();defaults();render();
window.addEventListener("resize",function(){var f=document.getElementById("fw-canvas");if(f){f.width=window.innerWidth;f.height=window.innerHeight}});
</script>
